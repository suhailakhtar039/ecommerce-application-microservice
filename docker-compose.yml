services:
  postgres:
    container_name: postgres_container
    image: postgres:14
    environment:
      POSTGRES_USER: suhail
      POSTGRES_PASSWORD: suhail
      POSTGRES_DB: product
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5433:5432"
    networks:
      - backend
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4
    environment:
      TZ: Asia/Kolkata
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/val/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - backend
    restart: unless-stopped

  mongodb:
    container_name: mongodb_container
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: suhail
      MONGO_INITDB_ROOT_PASSWORD: suhail
    volumes:
      - mongodb:/data/db
    ports:
      - "27018:27017"
    networks:
      - backend
    restart: unless-stopped

  mongo-express:
    container_name: mongo_express_container
    image: mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: suhail
      ME_CONFIG_MONGODB_ADMINPASSWORD: suhail
      ME_CONFIG_MONGODB_SERVER: mongodb
    ports:
      - "8085:8081"
    networks:
      - backend
    restart: unless-stopped

  rabbitmq:
    container_name: rabbitmq_container
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres:
  pgadmin:
  mongodb: